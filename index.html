<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Robin Hood - learning while scrolling</title>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }
        
        /* PRENDE O CHROME: Trava o fundo elástico para o navegador não balançar */
        html, body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            overscroll-behavior: none; 
            touch-action: none; 
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Mantém o alinhamento fixo no topo que você curtiu */
            padding: 16px 12px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        header {
            text-align: center;
            padding: 4px 0;
        }
        header h1 {
            font-size: 24px;
            margin: 0 0 2px 0;
            color: #facc15;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        header p {
            font-size: 11px;
            margin: 0;
            color: #a3a3a3;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .feed-stage {
            width: 100%;
            position: relative;
        }
        
        /* O CARD DO SEU JEITO: Sem tamanho engessado, descendo naturally */
        .card {
            background-color: #171717;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            padding: 20px;
            text-align: center;
            border: 1px solid #262626;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
        }
        
        .card.slide-up-out {
            transform: translateY(-130%) rotate(-2deg);
            opacity: 0;
            position: absolute; /* Vira absoluto só para voar sem empurrar o de trás */
        }

        .results-screen, .loading-screen, .theme-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #737373;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        
        .tema-tag {
            background-color: #000000;
            color: #facc15;
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid #eab308;
        }
        
        .question {
            font-size: 22px;
            font-weight: 700;
            margin: 16px 0;
            color: #ffffff;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }
        
        .btn-opt {
            background-color: #262626;
            color: #ffffff;
            border: 1px solid #404040;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
            text-align: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-opt.correct {
            background-color: rgba(234, 179, 8, 0.15);
            border-color: #facc15;
            color: #facc15;
            font-weight: 700;
        }
        
        .btn-opt.wrong {
            background-color: #0a0a0a;
            border-color: #262626;
            color: #525252;
            text-decoration: line-through;
        }
        
        .btn-opt:disabled {
            cursor: not-allowed;
        }
        
        #feedback {
            font-size: 13px;
            line-height: 1.5;
            color: #d4d4d4;
            padding: 12px;
            border-radius: 12px;
            background-color: #262626;
            border: 1px solid #404040;
            display: none;
            text-align: left;
            width: 100%;
        }
        
        .scroll-hint {
            color: #facc15;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
            text-align: center;
            margin-top: 4px;
            animation: bounceHint 1s infinite alternate;
        }
        
        @keyframes bounceHint {
            0% { transform: translateY(0); opacity: 0.5; }
            100% { transform: translateY(-4px); opacity: 1; }
        }

        .progress-bar-container {
            background-color: #262626;
            border-radius: 9999px;
            height: 4px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #facc15;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .score-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #000000;
            border: 3px solid #facc15;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 900;
            color: #facc15;
            margin: 12px 0;
        }
        
        .btn-restart {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }
        
        .loader {
            border: 3px solid #262626;
            border-top: 3px solid #facc15;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .theme-dropdown {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background-color: #262626;
            color: #ffffff;
            border: 1px solid #404040;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Robin Hood</h1>
        <p>learning-while-scrolling</p>
    </header>

    <div class="feed-stage">

        <div class="card loading-screen" id="loading-card" style="display: flex;">
            <div class="loader"></div>
            <p style="color: #a3a3a3; font-size: 14px; margin: 0;">Conectando a base de dados...</p>
        </div>

        <div class="card theme-screen" id="theme-card">
            <h2 style="margin: 0; font-size: 22px; font-weight: 800;">bora estudar?</h2>
            <p style="color: #a3a3a3; margin: 8px 0 16px 0; text-align: center; font-size: 14px; line-height: 1.4;">Selecione um assunto ou misture vários temas.</p>
            
            <select id="theme-select" class="theme-dropdown">
                <option value="all">tudo</option>
            </select>
            
            <button class="btn-opt" style="background-color: #facc15; color: #000; font-weight: 800; border: none; padding: 16px;" onclick="iniciarJogo()">Começar ➔</button>
        </div>

        <div class="card" id="game-card" style="display: none;">
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div class="meta-info">
                    <span class="tema-tag" id="tema-text">Tema</span>
                    <span id="progress-text">0 / 0</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar"></div>
                </div>
            </div>
            
            <div class="question" id="phrase-text">Carregando frase...</div>
            
            <div style="display: flex; flex-direction: column; gap: 10px; width: 100%;">
                <div class="options-grid">
                    <button class="btn-opt" id="btnA" onclick="verificarResposta('A')">Opção A</button>
                    <button class="btn-opt" id="btnB" onclick="verificarResposta('B')">Opção B</button>
                </div>
                
                <div id="feedback"></div>
                <div class="scroll-hint" id="hint-text">Arraste para cima em qualquer lugar ⬆</div>
            </div>
        </div>

        <div class="card results-screen" id="results-card">
            <h2 style="margin: 0; font-size: 24px; font-weight: 800;">Feito!</h2>
            <p id="timer-text" style="color: #a3a3a3; margin: 8px 0; font-size: 14px; text-align: center;"></p>
            <div class="score-circle" id="score-text">0%</div>
            <p id="totals-text" style="font-size: 15px; color: #d4d4d4; margin: 0 0 16px 0; text-align: center;"></p>
            <button class="btn-restart" onclick="voltarParaMenu()">bora para a próxima</button>
        </div>

    </div>
</div>

<script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlfqRfC9LaB1lVy4qnL15BS1qAGj0eaCNNvTCRlweFujUr85yTAznBv9OefmgLzZ_y/exec';

    let todosOsCards = []; 
    let meusCards = [];    
    let cardAtual = 0;     
    let acertos = 0;       
    let tempoInicio = 0; 
    let respondido = false;

    let touchStartY = 0;
    let touchEndY = 0;

    // Força o bloqueio do puxão elástico do Chrome em nível de sistema
    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });

    function carregarDadosDoScript() {
        fetch(APPS_SCRIPT_URL)
            .then(response => response.json()) 
            .then(data => {
                if(data.erro) {
                    throw new Error(data.erro);
                }
                todosOsCards = data.map(row => {
                    return {
                        tema: row.tema || 'Geral',
                        frase: row.frase || '',
                        opcaoA: row.opcaoA || '',
                        opcaoB: row.opcaoB || '',
                        respostaCorreta: row.respostaCorreta || '',
                        dicaCard: row.dicaCard || row.dica || '',
                        explicacaoFinalTema: row.explicacaoFinalTema || row.explicacaoFinal || ''
                    };
                });
                if (todosOsCards.length > 0) {
                    montarMenuDeTemas();
                } else {
                    document.getElementById('loading-card').innerHTML = "<p>Nenhuma pergunta encontrada.</p>";
                }
            })
            .catch(error => {
                document.getElementById('loading-card').innerHTML = "<p>Erro ao conectar com a planilha.</p>";
            });
    }

    function montarMenuDeTemas() {
        const select = document.getElementById('theme-select');
        select.innerHTML = '<option value="all">tudo</option>';
        
        const temasUnicos = [...new Set(todosOsCards.map(c => c.tema))];
        temasUnicos.forEach(tema => {
            const option = document.createElement('option');
            option.value = tema;
            option.innerText = tema;
            select.appendChild(option);
        });
        document.getElementById('loading-card').style.display = 'none';
        document.getElementById('theme-card').style.display = 'flex';
    }

    // Embaralha usando a lógica Fisher-Yates clássica para frescor do feed
    function embaralharArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]]; 
        }
        return array;
    }

    function iniciarJogo() {
        const temaSelecionado = document.getElementById('theme-select').value;
        if (temaSelecionado === 'all') {
            meusCards = embaralharArray([...todosOsCards]);
        } else {
            meusCards = embaralharArray(todosOsCards.filter(c => c.tema === temaSelecionado));
        }
        cardAtual = 0; 
        acertos = 0;
        tempoInicio = Date.now();
        
        document.getElementById('theme-card').style.display = 'none';
        const gameCard = document.getElementById('game-card');
        gameCard.style.display = 'flex';
        gameCard.classList.remove('slide-up-out');
        document.getElementById('results-card').style.display = 'none';
        
        carregarCard(); 
        configurarGestosGlobais(); 
    }

    function voltarParaMenu() {
        document.getElementById('results-card').style.display = 'none';
        const themeCard = document.getElementById('theme-card');
        themeCard.style.display = 'flex';
        themeCard.classList.remove('slide-up-out');
    }

    function carregarCard() {
        respondido = false; 
        const card = meusCards[cardAtual];
        
        document.getElementById('tema-text').innerText = card.tema;
        document.getElementById('progress-text').innerText = `${cardAtual + 1} / ${meusCards.length}`;
        document.getElementById('phrase-text').innerText = card.frase;
        
        const btnA = document.getElementById('btnA');
        const btnB = document.getElementById('btnB');
        btnA.innerText = card.opcaoA;
        btnB.innerText = card.opcaoB;
        
        btnA.className = "btn-opt";
        btnB.className = "btn-opt";
        btnA.disabled = false; 
        btnB.disabled = false;
        
        document.getElementById('bar').style.width = `${((cardAtual) / meusCards.length) * 100}%`;
        document.getElementById('feedback').style.display = "none";
        document.getElementById('hint-text').style.display = "none";
    }

    function verificarResposta(escolha) {
        if (respondido) return;
        respondido = true; 

        const card = meusCards[cardAtual];
        const btnA = document.getElementById('btnA');
        const btnB = document.getElementById('btnB');
        const feedbackDiv = document.getElementById('feedback');
        
        btnA.disabled = true;
        btnB.disabled = true;
        
        let textoEscolhido = escolha === 'A' ? card.opcaoA : card.opcaoB;
        let acertou = (textoEscolhido === card.respostaCorreta);
        
        if (acertou) {
            acertos++;
        }
        
        // Exibe estritamente apenas a Dica do Card correspondente durante o scrolling
        feedbackDiv.innerHTML = `
            <div style="margin-bottom: 4px;">
                <span style="font-size: 15px;">${acertou ? '🎯 <strong>Muito bem!</strong>' : '❌ <strong>Não foi dessa vez...</strong>'}</span>
            </div>
            <p style="margin: 4px 0 0 0; color: #ffffff; line-height: 1.4; font-size: 13px;">
                ${acertou ? 'Você pegou o contexto:' : `O correto é <strong>"${card.respostaCorreta}"</strong>.`}<br>
                <em>${card.dicaCard}</em>
            </p>
        `;
        
        if (btnA.innerText === card.respostaCorreta) btnA.classList.add('correct');
        else if (escolha === 'A') btnA.classList.add('wrong');
        
        if (btnB.innerText === card.respostaCorreta) btnB.classList.add('correct');
        else if (escolha === 'B') btnB.classList.add('wrong');
        
        feedbackDiv.style.display = "block";
        document.getElementById('hint-text').style.display = "block"; 
    }

    // GESTOS GLOBAIS: Captura o arrastão em qualquer ponto da tela
    function configurarGestosGlobais() {
        document.body.addEventListener('touchstart', (e) => {
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.body.addEventListener('touchend', (e) => {
            touchEndY = e.changedTouches[0].screenY;
            verificarSwipe();
        }, { passive: true });

        document.body.addEventListener('wheel', (e) => {
            if (e.deltaY > 40) { 
                processarSubidaDeCard();
            }
        }, { passive: true });
    }

    function verificarSwipe() {
        if (touchStartY - touchEndY > 40) { 
            processarSubidaDeCard();
        }
    }

    function processarSubidaDeCard() {
        if (!respondido) return; 

        const gameCard = document.getElementById('game-card');
        gameCard.classList.add('slide-up-out'); 
        
        setTimeout(() => {
            cardAtual++;
            if (cardAtual < meusCards.length) {
                carregarCard();
                gameCard.classList.remove('slide-up-out'); 
            } else {
                finalizarJogo();
            }
        }, 400);
    }

    function finalizarJogo() {
        const tempoFim = Date.now();
        const totalSegundos = Math.floor((tempoFim - tempoInicio) / 1000);
        const minutes = Math.floor(totalSegundos / 60);
        const segundosRestantes = totalSegundos % 60;
        
        let stringTempo = minutes === 0 ? `${segundosRestantes} segundos` : `${minutes} ${minutes === 1 ? 'minuto' : 'minutos'} e ${segundosRestantes} segundos`;

        document.getElementById('bar').style.width = `100%`; 
        
        document.getElementById('game-card').style.display = 'none';
        const resultsCard = document.getElementById('results-card');
        resultsCard.style.display = 'flex';
        resultsCard.classList.remove('slide-up-out');
        
        const temaJogado = meusCards[0]?.tema || 'Geral';
        const explicacaoDoTema = meusCards[0]?.explicacaoFinalTema || '';

        document.getElementById('score-text').innerText = `${Math.round((acertos / meusCards.length) * 100)}%`;
        document.getElementById('timer-text').innerText = `Excelente troca de tempo. Você estudou por ${stringTempo}!`;
        
        let htmlPreenchido = `Você acertou ${acertos} de ${meusCards.length} cards!`;
        
        // Injeta a caixa estilizada com o ExplicacaoFinal da planilha somente aqui, no final de tudo!
        if (explicacaoDoTema) {
            htmlPreenchido += `
                <div style="background: #262626; padding: 14px; border-radius: 14px; margin-top: 20px; text-align: left; border: 1px solid #404040; max-height: 180px; overflow-y: auto; -webkit-overflow-scrolling: touch;">
                    <p style="margin: 0 0 6px 0; font-size: 13px; color: #facc15; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">💡 Fechamento do Tema (${temaJogado}):</p>
                    <p style="margin: 0; font-size: 12px; color: #d4d4d4; line-height: 1.5;">${explicacaoDoTema}</p>
                </div>
            `;
        }
        
        document.getElementById('totals-text').innerHTML = htmlPreenchido;
    }

    window.onload = carregarDadosDoScript;
</script>

</body>
</html>
