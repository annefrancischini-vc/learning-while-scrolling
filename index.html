<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robin Hood - learning instead of just scrolling</title>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Bloqueia o scroll nativo da página inteira para simular o App */
        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
        }
        
        header {
            text-align: center;
            padding-top: 10px;
            margin-bottom: 15px;
            z-index: 10;
        }
        header h1 {
            font-size: 26px;
            margin: 0 0 2px 0;
            color: #facc15;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }
        header p {
            font-size: 11px;
            margin: 0;
            color: #a3a3a3;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        /* Palco onde os cards ficam empilhados */
        .feed-stage {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 75vh;
        }
        
        /* O CARD INTEGRAL */
        .card {
            background-color: #171717;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
            padding: 24px;
            text-align: center;
            border: 1px solid #262626;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            
            /* Transição suave para o efeito de arrastar */
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s ease;
            transform: translateY(0);
            opacity: 1;
            z-index: 2;
            touch-action: none; /* Impede o celular de puxar a tela para atualizar */
        }
        
        /* Quando o card é jogado para cima no scroll */
        .card.slide-up-out {
            transform: translateY(-130%) rotate(-3deg);
            opacity: 0;
            z-index: 1;
        }

        .results-screen, .loading-screen, .theme-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #737373;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            width: 100%;
        }
        
        .tema-tag {
            background-color: #000000;
            color: #facc15;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid #eab308;
        }
        
        /* Espaçamento otimizado da pergunta */
        .question {
            font-size: 24px;
            font-weight: 700;
            margin: 20px 0;
            color: #ffffff;
            line-height: 1.5;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto; /* Cola a grade de opções na parte inferior */
            width: 100%;
        }
        
        .btn-opt {
            background-color: #262626;
            color: #ffffff;
            border: 1px solid #404040;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            width: 100%;
            text-align: center;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn-opt:not(:disabled):hover {
            background-color: #404040;
        }
        
        .btn-opt.correct {
            background-color: rgba(234, 179, 8, 0.15);
            border-color: #facc15;
            color: #facc15;
            font-weight: 700;
        }
        
        .btn-opt.wrong {
            background-color: #0a0a0a;
            border-color: #262626;
            color: #525252;
            text-decoration: line-through;
        }
        
        #feedback {
            font-size: 14px;
            line-height: 1.5;
            margin-top: 12px;
            color: #d4d4d4;
            padding: 14px;
            border-radius: 12px;
            background-color: #262626;
            border: 1px solid #404040;
            display: none;
            text-align: left;
            width: 100%;
        }
        
        /* Mensagem animada flutuante induzindo o scroll */
        .scroll-hint {
            color: #facc15;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 12px;
            display: none;
            text-align: center;
            animation: bounceHint 1s infinite alternate;
        }
        
        @keyframes bounceHint {
            0% { transform: translateY(0); opacity: 0.5; }
            100% { transform: translateY(-5px); opacity: 1; }
        }

        .progress-bar-container {
            background-color: #262626;
            border-radius: 9999px;
            height: 4px;
            width: 100%;
            overflow: hidden;
        }
        .progress-bar {
            background-color: #facc15;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .score-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-color: #000000;
            border: 3px solid #facc15;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 900;
            color: #facc15;
            margin-bottom: 20px;
        }
        
        .btn-restart {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            width: 100%;
        }
        
        .loader {
            border: 3px solid #262626;
            border-top: 3px solid #facc15;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .theme-dropdown {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            background-color: #262626;
            color: #ffffff;
            border: 1px solid #404040;
            font-size: 16px;
            margin-bottom: 24px;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Robin Hood</h1>
        <p>Learning instead of scrolling</p>
    </header>

    <div class="feed-stage">

        <div class="card loading-screen" id="loading-card" style="display: flex;">
            <div class="loader"></div>
            <p style="color: #a3a3a3; font-size: 14px;">Conectando a base de dados...</p>
        </div>

        <div class="card theme-screen" id="theme-card">
            <h2 style="margin-top: 0; font-size: 22px; font-weight: 800;">bora estudar?</h2>
            <p style="color: #a3a3a3; margin-bottom: 24px; text-align: center; font-size: 14px; line-height: 1.5;">Selecione um assunto ou misture vários temas.</p>
            
            <select id="theme-select" class="theme-dropdown">
                <option value="all">tudo</option>
            </select>
            
            <button class="btn-opt" style="background-color: #facc15; color: #000; font-weight: 800; border: none; padding: 18px;" onclick="iniciarJogo()">Começar ➔</button>
        </div>

        <div class="card" id="game-card" style="display: none;">
            <div>
                <div class="meta-info">
                    <span class="tema-tag" id="tema-text">Tema</span>
                    <span id="progress-text">0 / 0</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="bar"></div>
                </div>
            </div>
            
            <div class="question" id="phrase-text">Carregando frase...</div>
            
            <div>
                <div class="options-grid">
                    <button class="btn-opt" id="btnA" onclick="verificarResposta('A')">Opção A</button>
                    <button class="btn-opt" id="btnB" onclick="verificarResposta('B')">Opção B</button>
                </div>
                
                <div id="feedback"></div>
                <div class="scroll-hint" id="hint-text">Arraste para cima para o próximo card ⬆</div>
            </div>
        </div>

        <div class="card results-screen" id="results-card">
            <h2 style="margin-top: 0; font-size: 24px; font-weight: 800;">Feito!</h2>
            <p id="timer-text" style="color: #a3a3a3; margin-bottom: 24px; font-size: 14px; min-height: 20px;"></p>
            <div class="score-circle" id="score-text">0%</div>
            <p id="totals-text" style="font-size: 15px; color: #d4d4d4; margin: 0;"></p>
            <button class="btn-restart" onclick="voltarParaMenu()">bora para a próxima</button>
        </div>

    </div>
</div>

<script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbysbH8Lio8M8QUCVMt2KVetPj8Fk44KjSxOAtGu4F3aV1pa264oxe87YX77NNXGabEa/exec';

    let todosOsCards = []; 
    let meusCards = [];    
    let cardAtual = 0;     
    let acertos = 0;       
    let tempoInicio = 0; 
    let respondido = false; // Só libera o gesto de arrastar após responder

    // Variáveis para rastrear o dedo no touch screen
    let touchStartY = 0;
    let touchEndY = 0;

    function carregarDadosDoScript() {
        fetch(APPS_SCRIPT_URL)
            .then(response => response.json()) 
            .then(data => {
                if(data.erro) {
                    throw new Error(data.erro);
                }
                todosOsCards = data.map(row => {
                    return {
                        tema: row.Tema || row.tema || 'Geral',
                        frase: row.Frase || row.frase || '',
                        opcaoA: row.OpcaoA || row.opcaoA || '',
                        opcaoB: row.OpcaoB || row.opcaoB || '',
                        respostaCorreta: row.RespostaCorreta || row.respostaCorreta || '',
                        dica: row.Dica || row.dica || ''
                    };
                });
                if (todosOsCards.length > 0) {
                    montarMenuDeTemas();
                } else {
                    document.getElementById('loading-card').innerHTML = "<p>Nenhuma pergunta encontrada.</p>";
                }
            })
            .catch(error => {
                document.getElementById('loading-card').innerHTML = "<p>Erro ao conectar com a planilha.</p>";
            });
    }

    function montarMenuDeTemas() {
        const select = document.getElementById('theme-select');
        const temasUnicos = [...new Set(todosOsCards.map(c => c.tema))];
        temasUnicos.forEach(tema => {
            const option = document.createElement('option');
            option.value = tema;
            option.innerText = tema;
            select.appendChild(option);
        });
        document.getElementById('loading-card').style.display = 'none';
        document.getElementById('theme-card').style.display = 'flex';
    }

    function embaralharArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]]; 
        }
        return array;
    }

    function iniciarJogo() {
        const temaSelecionado = document.getElementById('theme-select').value;
        if (temaSelecionado === 'all') {
            meusCards = embaralharArray([...todosOsCards]);
        } else {
            meusCards = embaralharArray(todosOsCards.filter(c => c.tema === temaSelecionado));
        }
        cardAtual = 0; 
        acertos = 0;
        tempoInicio = Date.now();
        
        document.getElementById('theme-card').classList.add('slide-up-out');
        const gameCard = document.getElementById('game-card');
        gameCard.style.display = 'flex';
        gameCard.classList.remove('slide-up-out');
        document.getElementById('results-card').style.display = 'none';
        
        carregarCard(); 
        configurarGestos(); // Ativa os ouvidores de toque do celular
    }

    function voltarParaMenu() {
        document.getElementById('results-card').classList.add('slide-up-out');
        const themeCard = document.getElementById('theme-card');
        themeCard.style.display = 'flex';
        themeCard.classList.remove('slide-up-out');
    }

    function carregarCard() {
        respondido = false; 
        const card = meusCards[cardAtual];
        
        document.getElementById('tema-text').innerText = card.tema;
        document.getElementById('progress-text').innerText = `${cardAtual + 1} / ${meusCards.length}`;
        document.getElementById('phrase-text').innerText = card.frase;
        
        const btnA = document.getElementById('btnA');
        const btnB = document.getElementById('btnB');
        btnA.innerText = card.opcaoA;
        btnB.innerText = card.opcaoB;
        
        btnA.className = "btn-opt";
        btnB.className = "btn-opt";
        btnA.disabled = false; 
        btnB.disabled = false;
        
        document.getElementById('bar').style.width = `${((cardAtual) / meusCards.length) * 100}%`;
        document.getElementById('feedback').style.display = "none";
        document.getElementById('hint-text').style.display = "none";
    }

    function verificarResposta(escolha) {
        respondido = true; // Libera o gesto de arrastar para cima
        const card = meusCards[cardAtual];
        const btnA = document.getElementById('btnA');
        const btnB = document.getElementById('btnB');
        const feedbackDiv = document.getElementById('feedback');
        
        btnA.disabled = true;
        btnB.disabled = true;
        
        let textoEscolhido = escolha === 'A' ? card.opcaoA : card.opcaoB;
        let acertou = (textoEscolhido === card.respostaCorreta);
        
        if (acertou) {
            acertos++;
            feedbackDiv.innerHTML = `<strong>Acertou! 🎯</strong><br>${card.dica}`;
        } else {
            feedbackDiv.innerHTML = `<strong>Incorreto. O certo é "${card.respostaCorreta}".</strong><br>${card.dica}`;
        }
        
        if (btnA.innerText === card.respostaCorreta) btnA.classList.add('correct');
        else if (escolha === 'A') btnA.classList.add('wrong');
        
        if (btnB.innerText === card.respostaCorreta) btnB.classList.add('correct');
        else if (escolha === 'B') btnB.classList.add('wrong');
        
        feedbackDiv.style.display = "block";
        document.getElementById('hint-text').style.display = "block"; // Mostra o aviso flutuante
    }

    // ENGENHARIA DE GESTOS (SWIPE DETECTOR)
    function configurarGestos() {
        const gameCard = document.getElementById('game-card');

        // Captura o ponto inicial do toque
        gameCard.addEventListener('touchstart', (e) => {
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        // Captura o ponto final quando solta o dedo
        gameCard.addEventListener('touchend', (e) => {
            touchEndY = e.changedTouches[0].screenY;
            verificarSwipe();
        }, { passive: true });

        // Suporte para testar no computador usando a rodinha do mouse
        gameCard.addEventListener('wheel', (e) => {
            if (e.deltaY > 50) { // Scroll para baixo simula arrastar para cima
                processarSubidaDeCard();
            }
        }, { passive: true });
    }

    function verificarSwipe() {
        // Se a diferença de movimento for maior que 50px de baixo para cima
        if (touchStartY - touchEndY > 50) {
            processarSubidaDeCard();
        }
    }

    function processarSubidaDeCard() {
        // Só passa o card se o usuário já tiver respondido
        if (!respondido) return; 

        const gameCard = document.getElementById('game-card');
        gameCard.classList.add('slide-up-out'); // Roda a transição CSS de subida
        
        setTimeout(() => {
            cardAtual++;
            if (cardAtual < meusCards.length) {
                carregarCard();
                gameCard.classList.remove('slide-up-out'); // Volta o card resetado para o centro
            } else {
                finalizarJogo();
            }
        }, 400);
    }

    function finalizarJogo() {
        const tempoFim = Date.now();
        const totalSegundos = Math.floor((tempoFim - tempoInicio) / 1000);
        const minutos = Math.floor(totalSegundos / 60);
        const segundosRestantes = totalSegundos % 60;
        
        let stringTempo = minutos === 0 ? `${segundosRestantes} segundos` : `${minutos} ${minutos === 1 ? 'minuto' : 'minutos'} e ${segundosRestantes} segundos`;

        document.getElementById('bar').style.width = `100%`; 
        const resultsCard = document.getElementById('results-card');
        resultsCard.style.display = 'flex';
        resultsCard.classList.remove('slide-up-out');
        document.getElementById('game-card').style.display = 'none';
        
        document.getElementById('score-text').innerText = `${Math.round((acertos / meusCards.length) * 100)}%`;
        document.getElementById('timer-text').innerText = `Excelente troca de tempo. Você estudou por ${stringTempo}!`;
        document.getElementById('totals-text').innerText = `Você acertou ${acertos} de ${meusCards.length} cards!`;
    }

    window.onload = carregarDadosDoScript;
</script>

</body>
</html>
